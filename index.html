<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Propuestas de Seguros Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .loader { border-top-color: #3b82f6; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .drop-zone--over { border-color: #3b82f6 !important; background-color: #eff6ff !important; transform: scale(1.01); }
        .drop-zone { transition: all 0.2s ease; border-radius: 1.5rem; }
        input, select { font-size: 16px !important; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen">

    <nav class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-200">
                    <i data-lucide="shield-check" class="text-white w-5 h-5"></i>
                </div>
                <span class="font-bold text-lg sm:text-xl tracking-tight text-slate-900">Seguros<span class="text-blue-600">Pro</span> <span class="hidden xs:inline-block text-[10px] uppercase bg-slate-100 px-2 py-0.5 rounded text-slate-500 ml-2">v6.0 Inteligente</span></span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-6 sm:mt-10 px-4 sm:px-6 pb-24">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-10">
            
            <!-- Panel Lateral Izquierdo -->
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-5 sm:p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h2 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-6 flex items-center gap-2">
                        <i data-lucide="user" class="w-4 h-4"></i> Datos del Agente
                    </h2>
                    <div class="space-y-4">
                        <input type="text" id="agentName" placeholder="Nombre del Agente" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition-colors">
                        <input type="email" id="agentEmail" placeholder="Correo electrónico" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition-colors">
                        <input type="text" id="agentPhone" placeholder="Teléfono" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 transition-colors">
                        
                        <div class="grid grid-cols-2 gap-3 pt-2">
                            <div id="logoDropZone" class="drop-zone flex flex-col items-center justify-center w-full h-24 border-2 border-dashed rounded-2xl cursor-pointer hover:bg-blue-50/30 overflow-hidden text-center p-2">
                                <img id="logoPreview" src="" class="hidden h-full w-full object-contain">
                                <div id="logoPlaceholder" class="text-[10px] text-slate-400">Logo Agente</div>
                                <input type="file" id="agentLogo" class="hidden" accept="image/*" />
                            </div>
                            <div id="signatureDropZone" class="drop-zone flex flex-col items-center justify-center w-full h-24 border-2 border-dashed rounded-2xl cursor-pointer hover:bg-blue-50/30 overflow-hidden text-center p-2">
                                <img id="signaturePreview" src="" class="hidden h-full w-full object-contain">
                                <div id="signaturePlaceholder" class="text-[10px] text-slate-400">Firma Digital</div>
                                <input type="file" id="agentSignature" class="hidden" accept="image/*" />
                            </div>
                        </div>

                        <div class="pt-2">
                            <div id="carrierLogoDropZone" class="drop-zone flex flex-col items-center justify-center w-full h-32 border-2 border-dashed rounded-2xl cursor-pointer hover:bg-blue-50/30 text-center p-4">
                                <img id="carrierLogoPreview" src="" class="hidden h-full w-full object-contain">
                                <div id="carrierLogoPlaceholder" class="text-[10px] text-slate-400">Logo Aseguradora</div>
                                <input type="file" id="carrierLogoInput" class="hidden" accept="image/*" />
                            </div>
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900 p-6 rounded-3xl shadow-xl text-white">
                    <p class="text-[10px] text-blue-400 font-bold mb-2 uppercase tracking-tighter">Configuración de Propuesta</p>
                    <input type="text" id="totalPremium" placeholder="Prima Total ($)" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl mb-4 text-white font-bold placeholder:text-slate-500 outline-none">
                    <select id="insuranceType" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl mb-4 appearance-none outline-none">
                        <option value="Gastos Médicos Mayores">Gastos Médicos Mayores</option>
                        <option value="Seguro de Vida">Seguro de Vida</option>
                        <option value="GMM Internacional">GMM Internacional</option>
                    </select>
                    <input type="text" id="carrierName" placeholder="Compañía Aseguradora" class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-xl outline-none">
                </div>
            </div>

            <!-- Área de Carga Central -->
            <div class="lg:col-span-8 space-y-6">
                <section class="bg-white p-5 sm:p-8 rounded-3xl shadow-sm border border-slate-100 min-h-[400px] flex flex-col">
                    <div id="docsDropZone" class="drop-zone flex-1 border-2 border-dashed border-slate-200 rounded-3xl p-6 sm:p-10 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-slate-50/50">
                        <i data-lucide="file-text" class="w-12 h-12 text-slate-300 mb-4"></i>
                        <h3 class="text-lg font-semibold text-slate-800">Sube la Cotización</h3>
                        <p class="text-xs text-slate-400 mt-2">Formatos aceptados: PDF e Imágenes</p>
                        <input type="file" id="docsUpload" class="hidden" multiple accept="image/*,application/pdf">
                        <div id="fileList" class="mt-4 w-full max-w-md space-y-2"></div>
                    </div>
                    <button id="generateBtn" disabled onclick="generateProposal()" class="mt-6 w-full py-4 bg-blue-600 text-white rounded-2xl font-bold shadow-lg disabled:bg-slate-300 transition-all active:scale-[0.98]">
                        Generar Propuesta PDF Premium
                    </button>
                </section>
            </div>
        </div>
    </main>

    <!-- Overlay de Carga -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-8 sm:p-10 rounded-[2.5rem] text-center max-w-xs w-full">
            <div class="loader w-16 h-16 border-4 border-t-blue-600 rounded-full mx-auto mb-6"></div>
            <p id="loadingTask" class="text-slate-600 font-medium">Investigando aseguradora y analizando datos...</p>
        </div>
    </div>

    <script type="module">
        const apiKey = ""; 
        let processedAgentLogo = null;
        let processedSignature = null;
        let carrierLogoManual = null;
        let fileContents = [];
        let analysisResults = null;

        const MODEL_TEXT = "gemini-2.5-flash-preview-09-2025";

        async function fetchWithRetry(url, options, retries = 5) {
            for (let i = 0; i <= retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    if (i === retries) throw new Error(`Status: ${response.status}`);
                    const delay = Math.min(1000 * Math.pow(2, i), 16000);
                    await new Promise(r => setTimeout(r, delay));
                } catch (e) { if (i === retries) throw e; }
            }
        }

        // Función para remover fondo blanco de una imagen (vuelca a PNG transparente)
        async function removeWhiteBackground(base64Str) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imgData.data;

                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i+1];
                        const b = data[i+2];
                        // Si el pixel es muy cercano al blanco puro, hacerlo totalmente transparente
                        if (r > 240 && g > 240 && b > 240) {
                            data[i+3] = 0;
                        }
                    }
                    ctx.putImageData(imgData, 0, 0);
                    resolve(canvas.toDataURL('image/png'));
                };
                img.src = base64Str;
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) window.lucide.createIcons();
            
            setupDropZone('logoDropZone', 'agentLogo', (files) => handleImage(files[0], 'logoPreview', 'logoPlaceholder', async data => {
                processedAgentLogo = await removeWhiteBackground(data);
            }));
            setupDropZone('signatureDropZone', 'agentSignature', (files) => handleImage(files[0], 'signaturePreview', 'signaturePlaceholder', async data => {
                processedSignature = await removeWhiteBackground(data);
            }));
            setupDropZone('carrierLogoDropZone', 'carrierLogoInput', (files) => handleImage(files[0], 'carrierLogoPreview', 'carrierLogoPlaceholder', async data => {
                carrierLogoManual = await removeWhiteBackground(data);
            }));
            setupDropZone('docsDropZone', 'docsUpload', handleDocs);
        });

        function handleImage(file, previewId, placeholderId, callback) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById(previewId);
                preview.src = e.target.result;
                preview.classList.remove('hidden');
                document.getElementById(placeholderId).classList.add('hidden');
                callback(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function handleDocs(files) {
            Array.from(files).forEach(file => {
                if (fileContents.length >= 2) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    fileContents.push({ name: file.name, data: e.target.result, type: file.type });
                    updateFileListUI();
                };
                reader.readAsDataURL(file);
            });
        }

        function setupDropZone(id, inputId, callback) {
            const zone = document.getElementById(id);
            const input = document.getElementById(inputId);
            zone.onclick = () => input.click();
            zone.ondragover = (e) => { e.preventDefault(); zone.classList.add('drop-zone--over'); };
            zone.ondragleave = () => zone.classList.remove('drop-zone--over');
            zone.ondrop = (e) => { e.preventDefault(); zone.classList.remove('drop-zone--over'); callback(e.dataTransfer.files); };
            input.onchange = () => callback(input.files);
        }

        function updateFileListUI() {
            const list = document.getElementById('fileList');
            list.innerHTML = fileContents.map(f => `
                <div class="flex items-center justify-between text-xs bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <span class="truncate pr-4">${f.name}</span>
                    <i data-lucide="check-circle-2" class="w-4 h-4 text-green-500"></i>
                </div>
            `).join('');
            if (window.lucide) window.lucide.createIcons();
            document.getElementById('generateBtn').disabled = fileContents.length === 0;
        }

        window.generateProposal = async function() {
            setLoading(true);
            const explicitCarrier = document.getElementById('carrierName').value;
            try {
                const prompt = `Analiza este documento de seguro. Extrae en formato JSON estricto:
                1. "cliente": {"nombre": "Nombre completo", "datos": "Ciudad/Fecha"}.
                2. "datosClave": {
                    "sumaAsegurada": {"pesos": "$", "umams": "U"},
                    "deducible": {"pesos": "$", "umams": "U"},
                    "coaseguro": "%",
                    "topeCoaseguro": {"pesos": "$", "umams": "U"},
                    "serieHospitalaria": "Nivel",
                    "thq": {"pesos": "$", "umams": "U"}
                }.
                3. "costoTotalAutomatico": "Extrae la cifra final de prima total".
                4. "proteccionCostoAdicional": [{"nombre": "Cobertura", "activo": true, "monto": "$"}],
                5. "beneficios": ["Lista de beneficios"],
                6. "resumenAseguradora": {
                   "nombre": "Nombre de la aseguradora",
                   "textoRespaldo": "Utilizando tus herramientas de búsqueda, genera un resumen institucional VERÍDICO y PROFESIONAL de la aseguradora ${explicitCarrier || 'mencionada en el documento'}. Menciona su origen, años de experiencia, solidez financiera, presencia en México y calificaciones mundiales (como AM Best o S&P). No inventes, usa datos reales."
                }`;

                const mainFile = fileContents[0];
                const base64Data = mainFile.data.split(',')[1];

                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_TEXT}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: mainFile.type.includes('pdf') ? 'application/pdf' : 'image/png', data: base64Data } }] }],
                        tools: [{ "google_search": {} }],
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                analysisResults = JSON.parse(response.candidates[0].content.parts[0].text);
                
                if (analysisResults.costoTotalAutomatico) {
                    document.getElementById('totalPremium').value = analysisResults.costoTotalAutomatico;
                }
                if (!explicitCarrier && analysisResults.resumenAseguradora?.nombre) {
                    document.getElementById('carrierName').value = analysisResults.resumenAseguradora.nombre;
                }

                await createPDF();
            } catch (e) { alert("Error al procesar: " + e.message); }
            finally { setLoading(false); }
        };

        function setLoading(s) { document.getElementById('loadingOverlay').classList.toggle('hidden', !s); }

        async function createPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const w = doc.internal.pageSize.getWidth();
            const h = doc.internal.pageSize.getHeight();
            
            const agent = document.getElementById('agentName').value || "Agente Autorizado";
            const email = document.getElementById('agentEmail').value || "";
            const phone = document.getElementById('agentPhone').value || "";
            const carrier = document.getElementById('carrierName').value;
            const type = document.getElementById('insuranceType').value;
            const premium = document.getElementById('totalPremium').value || analysisResults.costoTotalAutomatico;

            const bgColor = [15, 23, 42]; 
            const accentColor = [59, 130, 246]; 
            const cardColor = [30, 41, 59]; 

            const addLogo = (img, x, y, maxW, maxH, align = 'left') => {
                if (!img) return Promise.resolve();
                return new Promise(res => {
                    const i = new Image();
                    i.onload = () => {
                        let nw = i.width, nh = i.height;
                        const r = nw / nh;
                        if (nw > maxW) { nw = maxW; nh = nw / r; }
                        if (nh > maxH) { nh = maxH; nw = nh * r; }
                        let fx = x; 
                        if (align === 'right') fx = x - nw;
                        if (align === 'center') fx = x - (nw / 2);
                        doc.addImage(img, 'PNG', fx, y, nw, nh, undefined, 'FAST');
                        res();
                    };
                    i.src = img;
                });
            };

            // --- HOJA 1: PORTADA ---
            doc.setFillColor(...bgColor); doc.rect(0, 0, w, h, 'F');
            await addLogo(processedAgentLogo, 15, 10, 80, 80);
            const activeCarrierLogo = carrierLogoManual || (fileContents[0].type.includes('image') ? fileContents[0].data : null);
            await addLogo(activeCarrierLogo, w - 15, h - 35, 60, 60, 'right');
            doc.setTextColor(255); doc.setFontSize(10); doc.text("SOLUCIÓN TÉCNICA", 15, 110);
            doc.setFontSize(40); doc.setFont("helvetica", "bold");
            const splitType = doc.splitTextToSize(type.toUpperCase(), 130).slice(0, 2);
            doc.text(splitType, 15, 132, { lineHeightFactor: 1.1 });
            const cli = analysisResults.cliente || {};
            doc.setFontSize(14); doc.setTextColor(...accentColor); doc.text("DISEÑADO PARA:", 15, 175);
            doc.setFontSize(28); doc.setTextColor(255); doc.text(String(cli.nombre || "CLIENTE").toUpperCase(), 15, 188);
            doc.setDrawColor(51, 65, 85); doc.line(15, 220, 80, 220);
            doc.setFontSize(15); doc.text(agent, 15, 230);
            doc.setFontSize(10); doc.setTextColor(148, 163, 184); doc.text(email || "", 15, 237); doc.text(phone || "", 15, 243);

            // --- HOJA 2: CONFIGURACIÓN ---
            doc.addPage();
            doc.setFillColor(...bgColor); doc.rect(0, 0, w, h, 'F');
            await addLogo(processedAgentLogo, 15, 10, 80, 80);
            doc.setTextColor(255); doc.setFontSize(22); doc.setFont("helvetica", "normal"); doc.text("Configuración del Plan", 15, 42);
            const dc = analysisResults.datosClave || {};
            const grid = [
                { l: "SUMA ASEGURADA", v: dc.sumaAsegurada }, { l: "DEDUCIBLE", v: dc.deducible },
                { l: "COASEGURO", v: { pesos: dc.coaseguro } }, { l: "TOPE COASEGURO", v: dc.topeCoaseguro },
                { l: "SERIE HOSPITALARIA", v: { pesos: dc.serieHospitalaria } }, { l: "TABULADOR (THQ)", v: dc.thq }
            ];
            let gy = 52;
            grid.forEach((item, i) => {
                const bw = 55; const bh = 32; const col = i % 3; if (i > 0 && col === 0) gy += 38;
                const sx = 15 + (col * (bw + 5));
                doc.setFillColor(...cardColor); doc.roundedRect(sx, gy, bw, bh, 2.5, 2.5, 'F');
                doc.setFontSize(7.5); doc.setTextColor(148, 163, 184); doc.text(item.l, sx + 5, gy + 8);
                doc.setFontSize(12); doc.setTextColor(255); doc.text(String(item.v?.pesos || "-"), sx + 5, gy + 20);
                
                // Corrección: Solo imprimir descripción de UMAMs si el dato las contiene
                if (item.v?.umams && item.v.umams !== "" && item.v.umams !== "0") { 
                    doc.setFontSize(7); doc.setTextColor(94, 234, 212); 
                    const cleanedUmams = String(item.v.umams).replace(/umams?/gi, '').trim();
                    if (cleanedUmams.length > 0) {
                        doc.text(`${cleanedUmams} UMAMs`, sx + 5, gy + 27); 
                    }
                }
            });
            doc.setTextColor(255); doc.setFontSize(18); doc.text("Beneficios Adicionales", 15, gy + 48);
            const beneficios = analysisResults.beneficios || [];
            let by = gy + 58;
            beneficios.forEach(b => {
                if (by > 275) return; 
                doc.setFillColor(...cardColor); doc.roundedRect(15, by, w - 30, 11, 2, 2, 'F');
                doc.setTextColor(226, 232, 240); doc.setFontSize(10.5); doc.text(`• ${String(b).substring(0, 100)}`, 22, by + 7.2);
                by += 13.5; 
            });

            // --- HOJA 3: RESPALDO Y FIRMA ---
            doc.addPage();
            doc.setFillColor(...bgColor); doc.rect(0, 0, w, h, 'F');
            await addLogo(processedAgentLogo, 15, 10, 80, 80);
            
            doc.setTextColor(255); doc.setFontSize(22); doc.text("Protecciones con Costo", 15, 50);
            const protecciones = (analysisResults.proteccionCostoAdicional || []).filter(p => {
                const val = String(p.monto || "").toUpperCase();
                return p.activo && !["NO", "N/A", "FALSO"].includes(val);
            });
            let py = 60;
            if (protecciones.length === 0) {
                doc.setFontSize(10); doc.setTextColor(148, 163, 184); doc.text("Coberturas adicionales incluidas según plan base.", 15, py);
                py += 15;
            } else {
                protecciones.forEach(p => {
                    if (py > 110) return;
                    doc.setFillColor(...cardColor); doc.roundedRect(15, py, w - 30, 11, 2, 2, 'F');
                    doc.setTextColor(226, 232, 240); doc.setFontSize(10.5); doc.text(`• ${p.nombre}`, 22, py + 7.2);
                    doc.setTextColor(94, 234, 212); doc.setFontSize(9.5); doc.text("Incluida", w - 45, py + 7.2, { align: 'right' });
                    py += 13.5;
                });
            }

            if (premium) {
                doc.setFillColor(...accentColor); doc.roundedRect(15, py + 5, w - 30, 18, 4, 4, 'F');
                doc.setTextColor(255); doc.setFontSize(8); doc.text("INVERSIÓN TOTAL ESTIMADA", 22, py + 11);
                doc.setFontSize(16); doc.text(premium, 22, py + 19);
                py += 55; 
            } else { py += 45; }

            doc.setTextColor(255); doc.setFontSize(22); doc.text("Respaldo Institucional", 15, py);
            
            // Centrar logo de aseguradora dinámicamente
            await addLogo(activeCarrierLogo, w / 2, py + 6, 50, 40, 'center'); 
            
            doc.setTextColor(255); doc.setFontSize(10); doc.setFont("helvetica", "normal");
            
            const resumenReal = analysisResults.resumenAseguradora?.textoRespaldo || "Respaldo corporativo de primer nivel con solidez financiera garantizada.";
            const splitResumen = doc.splitTextToSize(resumenReal, w - 45);
            
            const drawJustifiedText = (textArray, startX, startY, maxWidth) => {
                textArray.forEach((line, index) => {
                    if (index === textArray.length - 1) {
                        doc.text(line, startX, startY + (index * 5));
                    } else {
                        const words = line.split(' ');
                        if (words.length > 1) {
                            const totalWordsWidth = words.reduce((acc, word) => acc + doc.getTextWidth(word), 0);
                            const spaceWidth = (maxWidth - totalWordsWidth) / (words.length - 1);
                            let currentX = startX;
                            words.forEach((word, wordIndex) => {
                                doc.text(word, currentX, startY + (index * 5));
                                currentX += doc.getTextWidth(word) + spaceWidth;
                            });
                        } else {
                            doc.text(line, startX, startY + (index * 5));
                        }
                    }
                });
                return startY + (textArray.length * 5);
            };

            const lastY = drawJustifiedText(splitResumen, 22.5, py + 32, w - 45);

            // --- ÁREA DE FIRMA DINÁMICA ---
            const whiteTop = Math.min(lastY + 15, h * 0.90); 
            const whiteHeight = h - whiteTop;
            
            doc.setFillColor(255, 255, 255); doc.rect(0, whiteTop, w, whiteHeight, 'F');
            
            const sy = h - (whiteHeight * 0.35); 
            
            if (processedSignature) {
                const sigMaxH = whiteHeight * 0.6;
                const sigY = whiteTop + (whiteHeight * 0.1);
                await addLogo(processedSignature, w / 2, sigY, 55, sigMaxH, 'center');
            }
            
            doc.setDrawColor(203, 213, 225); doc.setLineWidth(0.5);
            doc.line(w / 4, sy, (w * 3) / 4, sy);
            doc.setTextColor(100, 116, 139); doc.setFontSize(7.5); doc.text("FIRMA AUTORIZADA DEL AGENTE", w / 2, sy + 4, { align: 'center' });
            doc.setTextColor(15, 23, 42); doc.setFontSize(9); doc.text(agent.toUpperCase(), w / 2, sy + 8, { align: 'center' });

            doc.save(`Propuesta_${String(cli.nombre || "Cliente").replace(/\s+/g, '_')}.pdf`);
        }
    </script>
</body>
</html>
