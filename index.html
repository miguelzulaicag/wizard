<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Generador de Propuestas de Seguros Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .loader { border-top-color: #3b82f6; border-right-color: transparent; animation: spinner 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .drop-zone--over { border-color: #3b82f6 !important; background-color: #eff6ff !important; transform: scale(1.01); }
        .drop-zone { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 1.5rem; }
        input, select { font-size: 16px !important; transition: all 0.2s ease; }
    </style>
</head>
<body class="bg-[#f1f5f9] min-h-screen text-slate-900">

    <nav class="bg-white/80 backdrop-blur-xl border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2.5 rounded-2xl shadow-lg shadow-blue-200">
                    <i data-lucide="shield-check" class="text-white w-5 h-5"></i>
                </div>
                <div>
                    <span class="font-extrabold text-lg sm:text-xl tracking-tight text-slate-900">Seguros<span class="text-blue-600">Pro</span></span>
                    <span class="block text-[9px] font-bold text-slate-400 uppercase tracking-widest leading-none">Intelligence v6.8</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-6 sm:mt-10 px-4 sm:px-6 pb-24">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
            
            <div class="lg:col-span-4 space-y-6">
                <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200/60">
                    <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
                        <i data-lucide="user-cog" class="w-4 h-4 text-blue-500"></i> Identidad del Agente
                    </h2>
                    <div class="space-y-4">
                        <input type="text" id="agentName" placeholder="Nombre Agente" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500">
                        <input type="email" id="agentEmail" placeholder="correo@agente.com" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500">
                        <input type="text" id="agentPhone" placeholder="Teléfono" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:border-blue-500">
                        
                        <div class="grid grid-cols-1 gap-3">
                            <div id="logoDropZone" class="drop-zone flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-slate-200 rounded-2xl cursor-pointer hover:bg-blue-50 text-center p-2">
                                <img id="logoPreview" class="hidden h-full w-full object-contain">
                                <div id="logoPlaceholder">
                                    <i data-lucide="image" class="w-5 h-5 text-slate-400 mx-auto"></i>
                                    <span class="text-[9px] font-bold text-slate-400 uppercase">Logo Agente</span>
                                </div>
                                <input type="file" id="agentLogo" class="hidden" accept="image/*" />
                            </div>
                        </div>

                        <div id="carrierLogoDropZone" class="drop-zone flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-slate-200 rounded-2xl cursor-pointer hover:bg-blue-50 text-center p-4">
                            <img id="carrierLogoPreview" class="hidden h-full w-full object-contain">
                            <div id="carrierLogoPlaceholder">
                                <i data-lucide="building-2" class="w-6 h-6 text-slate-400 mx-auto"></i>
                                <span class="text-[9px] font-bold text-slate-400 uppercase">Logo Aseguradora (Portada)</span>
                            </div>
                            <input type="file" id="carrierLogoInput" class="hidden" accept="image/*" />
                        </div>
                    </div>
                </div>

                <div class="bg-slate-900 p-7 rounded-[2.5rem] shadow-2xl text-white">
                    <h2 class="text-[11px] font-black text-blue-400 uppercase tracking-[0.2em] mb-6">Detalles de la Propuesta</h2>
                    <div class="space-y-4">
                        <input type="text" id="carrierName" placeholder="Compañía" class="w-full px-4 py-3 bg-white/10 border border-white/10 rounded-2xl outline-none text-sm">
                        <select id="insuranceType" class="w-full px-4 py-3 bg-white/10 border border-white/10 rounded-2xl outline-none text-sm">
                            <option value="Gastos Médicos Mayores">Gastos Médicos Mayores</option>
                            <option value="Seguro de Vida">Seguro de Vida</option>
                            <option value="GMM Internacional">GMM Internacional</option>
                        </select>
                        <input type="text" id="totalPremium" placeholder="Inversión Final $ 0.00" class="w-full px-4 py-4 bg-blue-600/20 border border-blue-500/30 rounded-2xl text-blue-400 font-black text-lg">
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8">
                <section class="bg-white p-6 sm:p-10 rounded-[2.5rem] shadow-sm border border-slate-200/60 min-h-[500px] flex flex-col">
                    <div id="docsDropZone" class="drop-zone flex-1 border-2 border-dashed border-slate-200 rounded-[2rem] p-8 flex flex-col items-center justify-center text-center cursor-pointer hover:bg-blue-50/30 group">
                        <div class="bg-slate-50 p-6 rounded-full group-hover:bg-white shadow-sm border border-slate-100">
                            <i data-lucide="upload-cloud" class="w-10 h-10 text-blue-600"></i>
                        </div>
                        <h3 class="text-lg font-bold text-slate-800 mt-6">Carga la cotización</h3>
                        <p class="text-xs text-slate-400 mt-2">Formatos PDF e Imágenes aceptados</p>
                        <input type="file" id="docsUpload" class="hidden" multiple accept="image/*,application/pdf">
                        <div id="fileList" class="mt-8 w-full max-sm space-y-3"></div>
                    </div>

                    <button id="generateBtn" disabled onclick="window.initGenerationProcess()" class="mt-8 w-full py-5 bg-blue-600 text-white rounded-[1.5rem] font-black text-sm uppercase tracking-widest shadow-xl disabled:bg-slate-200 transition-all active:scale-[0.98]">
                        Generar Documento Maestro
                    </button>
                </section>
            </div>
        </div>
    </main>

    <div id="loadingOverlay" class="hidden fixed inset-0 bg-slate-950/40 backdrop-blur-md z-[100] flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[3rem] text-center max-w-sm w-full shadow-2xl">
            <div class="loader w-20 h-20 mx-auto mb-8 border-4 border-t-blue-600 rounded-full"></div>
            <h3 class="text-xl font-black text-slate-900 mb-2">Procesando Inteligencia</h3>
            <p id="loadingStatus" class="text-slate-500 text-sm font-medium">Investigando aseguradora y analizando UMAMs...</p>
        </div>
    </div>

    <script>
        const apiKey = ""; 

        let processedAgentLogo = null;
        let agentLogoColor = [37, 99, 235]; 
        let carrierLogoManual = null;
        let fileContents = [];
        let analysisResults = null;

        const MODEL_TEXT = "gemini-2.5-flash-preview-09-2025";

        async function fetchWithRetry(url, options, retries = 5) {
            for (let i = 0; i <= retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    if (i === retries) throw new Error(`Status: ${response.status}`);
                    await new Promise(r => setTimeout(r, Math.min(1000 * Math.pow(2, i), 16000)));
                } catch (e) { if (i === retries) throw e; }
            }
        }

        async function extractColorFromLogo(base64Str) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 100; canvas.height = 100;
                    ctx.drawImage(img, 0, 0, 100, 100);
                    try {
                        const data = ctx.getImageData(0, 0, 100, 100).data;
                        let r = 0, g = 0, b = 0, count = 0;
                        for (let i = 0; i < data.length; i += 16) {
                            if (data[i+3] > 200 && (data[i]+data[i+1]+data[i+2])/3 < 240) {
                                r += data[i]; g += data[i+1]; b += data[i+2]; count++;
                            }
                        }
                        resolve(count > 0 ? [Math.round(r/count), Math.round(g/count), Math.round(b/count)] : [37, 99, 235]);
                    } catch (e) { resolve([37, 99, 235]); }
                };
                img.onerror = () => resolve([37, 99, 235]);
                img.src = base64Str;
            });
        }

        async function removeWhiteBackground(base64Str) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    try {
                        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imgData.data;
                        for (let i = 0; i < data.length; i += 4) {
                            if (data[i] > 240 && data[i+1] > 240 && data[i+2] > 240) data[i+3] = 0;
                        }
                        ctx.putImageData(imgData, 0, 0);
                        resolve(canvas.toDataURL('image/png'));
                    } catch (e) { resolve(base64Str); }
                };
                img.onerror = () => resolve(base64Str);
                img.src = base64Str;
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) window.lucide.createIcons();
            setupDropZone('logoDropZone', 'agentLogo', (files) => handleImage(files[0], 'logoPreview', 'logoPlaceholder', async d => {
                processedAgentLogo = await removeWhiteBackground(d);
                agentLogoColor = await extractColorFromLogo(d);
            }));
            setupDropZone('carrierLogoDropZone', 'carrierLogoInput', (files) => handleImage(files[0], 'carrierLogoPreview', 'carrierLogoPlaceholder', async d => {
                carrierLogoManual = await removeWhiteBackground(d);
            }));
            setupDropZone('docsDropZone', 'docsUpload', handleDocs);
        });

        function handleImage(file, previewId, placeholderId, callback) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const preview = document.getElementById(previewId);
                preview.src = e.target.result; preview.classList.remove('hidden');
                document.getElementById(placeholderId).classList.add('hidden');
                callback(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function handleDocs(files) {
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    fileContents.push({ name: file.name, data: e.target.result, type: file.type });
                    updateFileListUI();
                };
                reader.readAsDataURL(file);
            });
        }

        function setupDropZone(id, inputId, callback) {
            const z = document.getElementById(id); const i = document.getElementById(inputId);
            if(!z || !i) return;
            z.onclick = () => i.click();
            z.ondragover = (e) => { e.preventDefault(); z.classList.add('drop-zone--over'); };
            z.ondragleave = () => z.classList.remove('drop-zone--over');
            z.ondrop = (e) => { e.preventDefault(); z.classList.remove('drop-zone--over'); callback(e.dataTransfer.files); };
            i.onchange = () => callback(i.files);
        }

        function updateFileListUI() {
            const list = document.getElementById('fileList');
            list.innerHTML = fileContents.map(f => `
                <div class="flex items-center justify-between text-[11px] font-bold bg-white p-4 rounded-2xl border border-slate-100 shadow-sm">
                    <div class="flex items-center gap-3">
                        <i data-lucide="file-check" class="w-4 h-4 text-blue-500"></i>
                        <span class="truncate pr-4 text-slate-700">${f.name}</span>
                    </div>
                </div>
            `).join('');
            if (window.lucide) window.lucide.createIcons();
            document.getElementById('generateBtn').disabled = fileContents.length === 0;
        }

        window.initGenerationProcess = async function() {
            setLoading(true);
            const explicitCarrier = document.getElementById('carrierName').value;
            try {
                const prompt = `Analiza la cotización detalladamente. 
                REGLAS ESPECIALES:
                1. Extrae equivalentes en UMAMs para: Suma Asegurada, Deducible, Tope Coaseguro y THQ si existen.
                2. Investiga profundamente a la aseguradora "${explicitCarrier || 'la compañía mencionada'}". 
                Redacta una reseña en 2 párrafos institucionales y de alto impacto que destaque su solidez financiera y especialización.
                3. Extrae la mayor cantidad posible de beneficios (mínimo 15 si están disponibles en el texto) para llenar la hoja.

                Responde estrictamente en JSON:
                {
                    "cliente": {"nombre": "NOMBRE"},
                    "datosClave": {
                        "sumaAsegurada": {"pesos": "$", "umam": "U"},
                        "deducible": {"pesos": "$", "umam": "U"},
                        "coaseguro": "%",
                        "topeCoaseguro": {"pesos": "$", "umam": "U"},
                        "serieHospitalaria": "Nivel",
                        "thq": {"pesos": "$", "umam": "U"}
                    },
                    "costoTotalAutomatico": "$",
                    "beneficios": ["Beneficios clave..."],
                    "proteccionesConCosto": ["Protecciones filtradas..."],
                    "resumenAseguradora": {
                       "nombre": "${explicitCarrier || 'Aseguradora'}",
                       "parrafo1": "Párrafo 1 institucional.",
                       "parrafo2": "Párrafo 2 de solidez."
                    }
                }`;

                const mainFile = fileContents[0];
                const base64Data = mainFile.data.split(',')[1];

                const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL_TEXT}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [
                            { text: prompt }, 
                            { inlineData: { mimeType: mainFile.type.includes('pdf') ? 'application/pdf' : 'image/png', data: base64Data } }
                        ] }],
                        generationConfig: { responseMimeType: "application/json", temperature: 0.1 }
                    })
                });

                if (!response.candidates?.[0]?.content?.parts?.[0]?.text) throw new Error("Respuesta de IA vacía");
                analysisResults = JSON.parse(response.candidates[0].content.parts[0].text);
                
                document.getElementById('loadingStatus').innerText = "Generando estructura de PDF...";
                await createPDF();
            } catch (e) { 
                console.error(e);
                alert("Error técnico: Asegúrate de estar conectado a internet y que el archivo cargado sea válido."); 
            } finally { setLoading(false); }
        };

        function setLoading(s) { document.getElementById('loadingOverlay').classList.toggle('hidden', !s); }

        async function createPDF() {
            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF('p', 'mm', 'a4');
                const w = doc.internal.pageSize.getWidth();
                const h = doc.internal.pageSize.getHeight();
                
                const agent = document.getElementById('agentName').value || "Agente Profesional";
                const email = document.getElementById('agentEmail').value || "";
                const phone = document.getElementById('agentPhone').value || "";
                const type = document.getElementById('insuranceType').value;
                const premium = document.getElementById('totalPremium').value || (analysisResults?.costoTotalAutomatico || "$ 0.00");

                const colorDark = [15, 23, 42];      
                const colorAccent = agentLogoColor || [37, 99, 235]; 
                const colorCard = [30, 41, 59];      

                const addLogo = async (imgData, x, y, maxW, maxH, align = 'left') => {
                    if (!imgData) return { w: 0, h: 0 };
                    return new Promise(res => {
                        const i = new Image();
                        i.onload = () => {
                            let nw = i.width, nh = i.height;
                            const r = nw / nh;
                            if (nw > maxW) { nw = maxW; nh = nw / r; }
                            if (nh > maxH) { nh = maxH; nw = nh * r; }
                            let fx = x; 
                            if (align === 'right') fx = x - nw; 
                            if (align === 'center') fx = x - (nw / 2);
                            try {
                                doc.addImage(i, 'PNG', fx, y, nw, nh, undefined, 'FAST');
                            } catch (e) { console.warn("Error insertando imagen:", e); }
                            res({ w: nw, h: nh });
                        };
                        i.onerror = () => res({ w: 0, h: 0 });
                        i.src = imgData;
                    });
                };

                const drawJustifiedText = (text, x, y, maxWidth) => {
                    if(!text) return y;
                    doc.setFont("helvetica", "normal");
                    const lines = doc.splitTextToSize(text, maxWidth);
                    lines.forEach((line, index) => {
                        if (index < lines.length - 1) {
                            const words = line.split(' ');
                            const totalWordsWidth = words.reduce((acc, word) => acc + doc.getTextWidth(word), 0);
                            const spaceWidth = (maxWidth - totalWordsWidth) / Math.max(1, words.length - 1);
                            let currentX = x;
                            words.forEach((word, wordIdx) => {
                                doc.text(word, currentX, y);
                                currentX += doc.getTextWidth(word) + (wordIdx < words.length - 1 ? spaceWidth : 0);
                            });
                        } else {
                            doc.text(line, x, y);
                        }
                        y += 5.5;
                    });
                    return y;
                };

                // PORTADA
                doc.setFillColor(...colorDark); doc.rect(0, 0, w, h, 'F');
                if (processedAgentLogo) await addLogo(processedAgentLogo, 20, 15, 80, 40);
                
                const firstFile = fileContents[0];
                const activeCarrierLogo = carrierLogoManual || (firstFile?.type.includes('image') ? firstFile.data : null);
                if (activeCarrierLogo) await addLogo(activeCarrierLogo, w - 20, h - 45, 65, 30, 'right');

                doc.setTextColor(255); doc.setFontSize(11); doc.setFont("helvetica", "bold");
                doc.text("ESTRATEGIA DE PROTECCIÓN PATRIMONIAL", 20, 115);
                doc.setFontSize(48); doc.text(type.toUpperCase(), 20, 140, { maxWidth: 160 });
                doc.setFontSize(12); doc.setTextColor(148, 163, 184); doc.text("DISEÑADO EXCLUSIVAMENTE PARA:", 20, 185);
                doc.setFontSize(32); doc.setTextColor(255); doc.text(String(analysisResults?.cliente?.nombre || "CLIENTE").toUpperCase(), 20, 200);

                // PÁGINA 2
                doc.addPage();
                doc.setFillColor(...colorDark); doc.rect(0, 0, w, h, 'F');
                if (processedAgentLogo) await addLogo(processedAgentLogo, 20, 15, 80, 40);
                doc.setTextColor(255); doc.setFontSize(18); doc.setFont("helvetica", "bold"); 
                doc.text("Resumen de Cobertura", 20, 48);
                
                const dc = analysisResults?.datosClave || {};
                const grid = [
                    { l: "SUMA ASEGURADA", v: dc.sumaAsegurada, key: 'sum' }, 
                    { l: "DEDUCIBLE", v: dc.deducible, key: 'ded' },
                    { l: "COASEGURO", v: { pesos: dc.coaseguro }, key: 'coa' }, 
                    { l: "TOPE COASEGURO", v: dc.topeCoaseguro, key: 'top' },
                    { l: "NIVEL HOSPITALARIO", v: { pesos: dc.serieHospitalaria }, key: 'niv' }, 
                    { l: "TABULADOR MÉDICO", v: dc.thq, key: 'tab' }
                ];
                
                let gy = 58;
                grid.forEach((item, i) => {
                    const col = i % 2; if (i > 0 && col === 0) gy += 28;
                    const sx = 20 + (col * 88);
                    doc.setFillColor(...colorCard); doc.roundedRect(sx, gy, 83, 24, 3, 3, 'F');
                    doc.setFontSize(7); doc.setTextColor(148, 163, 184); 
                    doc.setFont("helvetica", "normal");
                    doc.text(item.l, sx + 5, gy + 7);
                    
                    const valueStr = String(item.v?.pesos || "N/A");
                    doc.setFontSize(11); doc.setTextColor(255);
                    doc.text(valueStr, sx + 5, gy + 15);
                    
                    // Lógica estricta para evitar duplicidad de UMAMs
                    if(item.v?.umam && item.key !== 'top' && item.key !== 'coa' && item.key !== 'niv') {
                        // Comprobamos si el valor principal ya menciona UMAM o UMA
                        const hasUmamInMain = valueStr.toUpperCase().includes("UMAM") || valueStr.toUpperCase().includes(" UMA");
                        
                        if (!hasUmamInMain) {
                            // Limpiamos el valor de umam por si la IA ya le puso la etiqueta
                            let umamClean = String(item.v.umam).toUpperCase().replace("UMAMS", "").replace("UMAM", "").trim();
                            if (umamClean && umamClean !== "N/A" && umamClean !== "UNDEFINED") {
                                doc.setFontSize(8); doc.setTextColor(...colorAccent);
                                doc.text(`${umamClean} UMAMs`, sx + 5, gy + 20);
                            }
                        }
                    }
                });

                doc.setFont("helvetica", "bold"); doc.setTextColor(255); doc.setFontSize(18); 
                doc.text("Principales Beneficios", 20, gy + 42);
                let by = gy + 50;
                (analysisResults?.beneficios || []).slice(0, 18).forEach(b => {
                    if (by + 11 < h - 20) {
                        doc.setFillColor(...colorCard); doc.roundedRect(20, by, w - 40, 9, 2, 2, 'F');
                        doc.setFillColor(...colorAccent); doc.circle(26, by + 4.5, 1, 'F');
                        doc.setTextColor(226, 232, 240); doc.setFontSize(9);
                        doc.setFont("helvetica", "normal");
                        doc.text(String(b).substring(0, 90), 32, by + 6);
                        by += 10.5;
                    }
                });

                // PÁGINA 3
                doc.addPage();
                doc.setFillColor(...colorDark); doc.rect(0, 0, w, h, 'F');
                if (processedAgentLogo) await addLogo(processedAgentLogo, 20, 15, 80, 40);
                doc.setFont("helvetica", "bold"); doc.setTextColor(255); doc.setFontSize(18); 
                doc.text("Protecciones con Costo", 20, 52);
                let pcy = 60;
                (analysisResults?.proteccionesConCosto || []).forEach(p => {
                    doc.setFillColor(...colorCard); doc.roundedRect(20, pcy, w - 40, 9, 2, 2, 'F');
                    doc.setFillColor(...colorAccent); doc.circle(26, pcy + 4.5, 1, 'F');
                    doc.setTextColor(226, 232, 240); doc.setFontSize(9);
                    doc.setFont("helvetica", "normal");
                    doc.text(String(p).substring(0, 85), 32, pcy + 6);
                    pcy += 11;
                });

                let nextY = pcy + 15;
                if (premium) {
                    doc.setFillColor(...colorAccent); doc.roundedRect(20, nextY, w - 40, 22, 5, 5, 'F');
                    doc.setTextColor(255); doc.setFontSize(10); 
                    doc.text("INVERSIÓN TOTAL ANUAL (NETA)", 30, nextY + 8);
                    doc.setFontSize(22); 
                    doc.text(String(premium), 30, nextY + 17);
                    nextY += 45; 
                }

                doc.setFont("helvetica", "bold"); doc.setTextColor(255); doc.setFontSize(16); 
                doc.text("Socio Estratégico", 20, nextY);
                nextY += 12;
                if (activeCarrierLogo) {
                    const d = await addLogo(activeCarrierLogo, w/2, nextY, 65, 30, 'center');
                    nextY += (d.h || 30) + 12;
                }
                doc.setTextColor(180, 190, 205); doc.setFontSize(10);
                doc.setFont("helvetica", "normal");
                nextY = drawJustifiedText(analysisResults?.resumenAseguradora?.parrafo1, 22, nextY, w-44);
                nextY = drawJustifiedText(analysisResults?.resumenAseguradora?.parrafo2, 22, nextY + 6, w-44);

                const whiteAreaY = Math.max(nextY + 15, h * 0.76);
                const whiteAreaHeight = h - whiteAreaY;
                doc.setFillColor(...colorAccent); doc.rect(0, whiteAreaY - 1, w, 1, 'F');
                doc.setFillColor(255); doc.rect(0, whiteAreaY, w, whiteAreaHeight, 'F');
                const centerY = whiteAreaY + (whiteAreaHeight / 2);
                doc.setTextColor(15, 23, 42); doc.setFontSize(14); doc.setFont("helvetica", "bold");
                doc.text(agent.toUpperCase(), w/2, centerY - 6, { align: 'center' });
                doc.setFontSize(10); doc.setFont("helvetica", "normal"); doc.setTextColor(100, 116, 139);
                doc.text("Agente de Seguros Certificado", w/2, centerY, { align: 'center' });
                doc.setFontSize(10); doc.setTextColor(51, 65, 85);
                doc.text(`${email}  •  ${phone}`, w/2, centerY + 8, { align: 'center' });
                
                doc.save(`Propuesta_${analysisResults?.cliente?.nombre || "Cliente"}.pdf`);
            } catch (error) {
                console.error("Fallo generacion PDF:", error);
                alert("Error al construir el PDF. Intenta con un archivo de cotización diferente.");
            }
        }
    </script>
</body>
</html>
